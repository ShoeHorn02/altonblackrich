image: node:12.16.1

stages:
  - deploy


deploy-production:
  stage: deploy
  only:
    - master
  script:
    - npm install
    - npm audit fix
    - CI=false npm run build
    - npm rebuild node-sass
    - npm install -g firebase-tools@11.7.0
    - firebase use fry2-demo --token $FIREBASE_TOKEN
    - firebase target:apply hosting production fry2-demo --token $FIREBASE_TOKEN
    - firebase deploy --only hosting:production --token $FIREBASE_TOKEN
